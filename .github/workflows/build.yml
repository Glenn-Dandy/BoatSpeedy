name: Build APK

on:
  push:
    branches: ['**']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
      IS_DEV: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/heads/') && github.ref != 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Tags/Historie für `git describe` (versionName)

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Keystore für signierte Builds: Release (Tag) und DEV (Feature-Branch) nutzen
      # denselben Release-Key. Ohne Keystore baut Debug unsigniert weiter.
      - name: Restore keystore
        if: ${{ env.IS_TAG == 'true' || env.IS_DEV == 'true' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
          cat > keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # --- Signierter Release-Build: nur bei v*-Tags ---
      - name: Build signed release APK
        if: ${{ env.IS_TAG == 'true' }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename release APK
        if: ${{ env.IS_TAG == 'true' }}
        run: cp app/build/outputs/apk/release/app-release.apk "BoatSpeedy-${{ github.ref_name }}-release.apk"

      - name: Attach release APK to GitHub Release
        if: ${{ env.IS_TAG == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: BoatSpeedy-*-release.apk

      # --- Rolling DEV-Build: bei Push auf einen Feature-Branch (nicht main/Tag) ---
      # Dient zugleich als PR-Check und aktualisiert das eine „dev"-Pre-Release,
      # sodass es immer nur den aktuellen Dev-Build gibt.
      - name: Build DEV APK (signed with release key)
        if: ${{ env.IS_DEV == 'true' }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename DEV APK
        if: ${{ env.IS_DEV == 'true' }}
        run: cp app/build/outputs/apk/debug/app-debug.apk "BoatSpeedy-dev.apk"

      - name: Publish rolling dev pre-release
        if: ${{ env.IS_DEV == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Latest dev build
          prerelease: true
          body: |
            Rolling development build — package `de.kewl.boatspeedy.debug`, label “BoatSpeedy DEV”
            (installs alongside the release app). Signed with the release key.

            Branch `${{ github.ref_name }}` · commit ${{ github.sha }}
          files: BoatSpeedy-dev.apk

      - name: Clean up secrets on runner
        if: always()
        run: rm -f keystore.properties "$RUNNER_TEMP/release.jks"
