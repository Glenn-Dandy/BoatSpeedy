name: Build APK

on:
  push:
    branches: [dev]      # Entwicklungs-Branch → DEV-Build + rollendes Pre-Release
    tags: ['v*']         # Tag auf main → signiertes Release
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
      IS_DEV: ${{ github.event_name == 'push' && github.ref == 'refs/heads/dev' }}
      IS_PR: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Tags/Historie für `git describe` (versionName)

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Keystore für signierte Builds: Release (Tag) und DEV (dev-Branch) nutzen
      # denselben Release-Key. Bei PRs nicht nötig → unsignierter Debug-Check.
      - name: Restore keystore
        if: ${{ env.IS_TAG == 'true' || env.IS_DEV == 'true' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
          cat > keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # --- Signierter Release-Build: nur bei v*-Tags (auf main) ---
      - name: Build signed release APK
        if: ${{ env.IS_TAG == 'true' }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename release APK
        if: ${{ env.IS_TAG == 'true' }}
        run: cp app/build/outputs/apk/release/app-release.apk "BoatSpeedy-${{ github.ref_name }}-release.apk"

      - name: Attach release APK to GitHub Release
        if: ${{ env.IS_TAG == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: BoatSpeedy-*-release.apk

      # --- Rolling DEV-Build: bei Push auf den dev-Branch ---
      # Aktualisiert das eine „dev-build"-Pre-Release → immer nur der aktuelle Dev-Build.
      - name: Build DEV APK (signed with release key)
        if: ${{ env.IS_DEV == 'true' }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename DEV APK
        if: ${{ env.IS_DEV == 'true' }}
        run: cp app/build/outputs/apk/debug/app-debug.apk "BoatSpeedy-dev.apk"

      - name: Publish rolling dev pre-release
        if: ${{ env.IS_DEV == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-build
          name: Latest dev build
          prerelease: true
          body: |
            Rolling development build — package `de.kewl.boatspeedy.debug`, label “BoatSpeedy DEV”
            (installs alongside the release app). Signed with the release key.

            Built from branch `${{ github.ref_name }}` · commit ${{ github.sha }}
          files: BoatSpeedy-dev.apk

      # --- PR-Check: unsignierter Debug-Build (nur Kompilier-Check) ---
      - name: Build debug APK (PR check)
        if: ${{ env.IS_PR == 'true' }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK artifact (PR check)
        if: ${{ env.IS_PR == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: BoatSpeedy-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Clean up secrets on runner
        if: always()
        run: rm -f keystore.properties "$RUNNER_TEMP/release.jks"
