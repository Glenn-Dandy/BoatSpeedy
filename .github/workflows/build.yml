name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # --- Debug-Build: bei Push auf main, PRs und manuell ---
      - name: Build debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: cp app/build/outputs/apk/debug/app-debug.apk "BoatSpeedy-debug.apk"

      - name: Upload debug APK artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: BoatSpeedy-debug-apk
          path: BoatSpeedy-debug.apk
          if-no-files-found: error

      # --- Signierter Release-Build: nur bei v*-Tags ---
      - name: Restore keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Create keystore.properties
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cat > keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build signed release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: cp app/build/outputs/apk/release/app-release.apk "BoatSpeedy-${{ github.ref_name }}-release.apk"

      - name: Attach release APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: BoatSpeedy-*-release.apk

      - name: Clean up secrets on runner
        if: always()
        run: rm -f keystore.properties "$RUNNER_TEMP/release.jks"
